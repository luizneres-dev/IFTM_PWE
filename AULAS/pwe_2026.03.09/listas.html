<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <style>
        body {
            margin-left: 50px;
        }
    </style>
</head>
<body>
    <p>Disciplinas do 1º Período:</p>
    <!--Lista não ordernada-->
    <ul>
        <li>Projeto Website Estático</li>
        <li>Lógica de programção</li>
    </ul>
    <p>Itens:</p>
    <!--Lista ordenada-->
    <ol type="I" start="1500"> <!-- exemplos: type="A, 1, I"-->
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
</body>
</html>
