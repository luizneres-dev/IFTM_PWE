<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        th {
            background-color: aquamarine;
            color: blue;
        }
        td {
            background-color: black;
            color: fuchsia;
        }
    </style>
</head>
<body> <!-- Mesclar colunas e linhas!! -->
    <table border="1" align="center" width="400" cellpadding="10"> <!-- Tabela -->
        <caption>Legenda da tabela</caption>
        <tr> <!-- Linha 1 -->
            <th>Nome</th> <!-- Coluna 1 -->
            <th>Idade</th> <!-- Coluna 2 -->
            <th>Sexo</th> <!-- Coluna 3 -->
        </tr>
        <tr>
            <td>Luiz</td>
            <td>19</td>
            <td>M</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
    </table>
</body>
</html>
